<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#efe3ff">
<title>♡ Sara's Cutris ♡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#efe3ff; --bg2:#e7ecff; --ink:#6b5c8a;
    --panel:#faf6ff; --panelShadow:#e0d0ff;
    --btn:#e4d6ff; --btnA:#cdbcf5; --btnText:#6e4f9a;
    --grid:#1f1635;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;}
  html,body{margin:0; height:100%; overflow:hidden;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    font-family:"Baloo 2","Comic Sans MS","Segoe UI Rounded",system-ui,sans-serif;
    color:var(--ink); touch-action:none;}
  #app{position:fixed; inset:0; display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) 6px env(safe-area-inset-bottom);}

  /* ---- compact top bar ---- */
  .topbar{flex:0 0 auto; width:100%; max-width:480px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between;
    gap:8px; padding:2px 8px;}
  .brand{font-family:"Press Start 2P",system-ui,sans-serif;
    font-size:10px; color:#a55dff; line-height:1.3;
    text-shadow:0 0 6px #c79eff, 0 0 12px #a55dff;}
  .stats{display:flex; align-items:center; gap:12px;}
  .stat{display:flex; flex-direction:column; align-items:center; line-height:1;}
  .stat b{font-family:"Press Start 2P",system-ui,sans-serif;
    font-size:12px; color:#8a48c0;}
  .stat i{font-style:normal; font-size:8px; opacity:.6; margin-top:3px;
    text-transform:uppercase; letter-spacing:.5px;}
  #next{background:transparent;}
  .icons{display:flex; gap:6px;}
  .icon{appearance:none; border:none; background:var(--btn); color:var(--btnText);
    width:34px; height:34px; border-radius:11px; font-size:15px;
    box-shadow:0 3px 0 var(--btnA); display:flex; align-items:center; justify-content:center;}
  .icon:active{transform:translateY(2px); box-shadow:0 1px 0 var(--btnA);}

  /* ---- play area fills the rest (~3/4) ---- */
  .play-area{flex:1 1 auto; min-height:0; width:100%;
    display:flex; align-items:center; justify-content:center; padding:4px 0;}
  .stage{position:relative; background:var(--panel);
    border-radius:16px; padding:8px; box-shadow:0 6px 0 var(--panelShadow);}
  canvas{display:block; border-radius:10px; background:var(--grid);}
  #board{box-shadow:inset 0 0 22px rgba(0,0,0,.5);}

  .scan{position:absolute; inset:8px; border-radius:10px; pointer-events:none;
    background:repeating-linear-gradient(rgba(255,255,255,0) 0 2px, rgba(0,0,0,.16) 2px 3px);
    opacity:.5;}
  .flash{position:absolute; inset:8px; border-radius:10px; pointer-events:none;
    background:#fff; opacity:0;}
  .flash.go{animation:flash .18s ease-out;}
  @keyframes flash{from{opacity:.75;} to{opacity:0;}}
  .combo{position:absolute; top:18%; left:0; right:0; text-align:center;
    font-family:"Press Start 2P",system-ui,sans-serif; font-size:18px;
    color:#fff; pointer-events:none; opacity:0;
    text-shadow:0 0 8px #a55dff,0 0 16px #a55dff,0 2px 0 #5a2899;}
  .combo.go{animation:combo .7s ease-out;}
  @keyframes combo{
    0%{opacity:0; transform:scale(.4);}
    25%{opacity:1; transform:scale(1.25);}
    60%{opacity:1; transform:scale(1);}
    100%{opacity:0; transform:scale(1) translateY(-16px);}}
  .stage.shake{animation:shake .2s;}
  @keyframes shake{
    0%,100%{transform:translate(0,0);} 20%{transform:translate(-4px,3px);}
    40%{transform:translate(4px,-3px);} 60%{transform:translate(-3px,-2px);}
    80%{transform:translate(3px,2px);}}

  /* ---- bottom control zone (~1/4) ---- */
  .controls{flex:0 0 auto; width:100%; max-width:480px; margin:0 auto;
    height:20vh; min-height:130px; max-height:185px;
    display:flex; align-items:stretch; justify-content:space-between;
    gap:12px; padding:6px 12px;}
  .dpad{flex:1 1 auto; max-width:240px; height:100%;
    display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:10px;}
  .btn{appearance:none; border:none; background:var(--btn);
    color:var(--btnText); font-weight:800; font-family:inherit;
    border-radius:18px; box-shadow:0 5px 0 var(--btnA);
    display:flex; align-items:center; justify-content:center;
    transition:transform .05s, box-shadow .05s; touch-action:none;}
  .btn:active{transform:translateY(3px); box-shadow:0 2px 0 var(--btnA);}
  .dpad .btn{font-size:30px;}
  .dpad .down{grid-column:1 / span 2;}
  .spin{flex:0 0 auto; width:34vw; max-width:150px;
    border-radius:26px; font-size:42px;}

  .overlay{position:absolute; inset:0; display:none;
    align-items:center; justify-content:center; flex-direction:column;
    background:rgba(250,246,255,.93); border-radius:16px; text-align:center; padding:20px;}
  .overlay.show{display:flex;}
  .overlay h2{margin:.2em 0; font-size:26px;}
  .overlay p{margin:.2em 0; font-size:15px; opacity:.8;}
  .overlay .play{margin-top:14px; background:var(--btn); color:var(--btnText);
    border:none; font-family:inherit; font-weight:800; font-size:18px;
    padding:12px 28px; border-radius:20px; box-shadow:0 4px 0 var(--btnA);}
  .overlay .play:active{transform:translateY(3px); box-shadow:0 1px 0 var(--btnA);}
  .heart{font-size:34px;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">♡ Sara's<br>Cutris ♡</div>
    <div class="stats">
      <div class="stat"><b id="score">0</b><i>Score</i></div>
      <div class="stat"><b id="lines">0</b><i>Lines</i></div>
      <div class="stat"><b id="level">1</b><i>Lvl</i></div>
      <canvas id="next" width="44" height="44"></canvas>
    </div>
    <div class="icons">
      <button class="icon" id="pause">⏸</button>
      <button class="icon" id="mute">🔊</button>
    </div>
  </div>

  <div class="play-area">
    <div class="stage">
      <canvas id="board"></canvas>
      <div class="scan"></div>
      <div class="flash" id="flash"></div>
      <div class="combo" id="combo"></div>
      <div class="overlay show" id="overlay">
        <div class="heart">🌸</div>
        <h2 id="ovTitle">Hi Sara!</h2>
        <p id="ovText">Tap play and have fun ♡</p>
        <button class="play" id="playBtn">Play ♡</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="dpad">
      <button class="btn" id="left">◀</button>
      <button class="btn" id="right">▶</button>
      <button class="btn down" id="down">▼</button>
    </div>
    <button class="btn spin" id="spin">↻</button>
  </div>
</div>

<script>
const COLS=10, ROWS=20;
const board=document.getElementById('board');
const nextCv=document.getElementById('next');
const bctx=board.getContext('2d');
const nctx=nextCv.getContext('2d');

// ---- arcade sound engine (Web Audio, no files needed) ----
let actx=null, muted=false;
function audio(){
  if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(actx && actx.state==='suspended') actx.resume();
  return actx;
}
function beep(freq,dur,type='square',vol=0.15,slideTo){
  const ac=audio(); if(!ac||muted) return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,ac.currentTime);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,ac.currentTime+dur);
  g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime+dur);
}
function arp(notes,dur,type='square',vol=0.13,gap=0.06){
  notes.forEach((f,i)=>setTimeout(()=>beep(f,dur,type,vol),i*gap*1000));
}
const SFX={
  move:()=>beep(220,0.04,'square',0.07),
  rotate:()=>beep(460,0.06,'square',0.09),
  soft:()=>beep(150,0.04,'square',0.05),
  drop:()=>beep(340,0.14,'sawtooth',0.14,70),
  lock:()=>beep(190,0.05,'square',0.08),
  line:(n)=>arp([523,659,784,1047,1318].slice(0,Math.min(5,n+1)),0.16,'square',0.14,0.05),
  level:()=>arp([523,659,784,1047,1318,1568],0.14,'triangle',0.14,0.07),
  over:()=>arp([440,349,294,196],0.28,'sawtooth',0.16,0.13)
};

// ---- arcade feedback (flash + shake) ----
const stageEl=document.querySelector('.stage');
const flashEl=document.getElementById('flash');
function flash(){ flashEl.classList.remove('go'); void flashEl.offsetWidth; flashEl.classList.add('go'); }
function shake(){ stageEl.classList.remove('shake'); void stageEl.offsetWidth; stageEl.classList.add('shake'); }

const comboEl=document.getElementById('combo');
function comboPop(n){
  comboEl.textContent='COMBO x'+n+'!';
  comboEl.classList.remove('go'); void comboEl.offsetWidth; comboEl.classList.add('go');
}

// ---- vibration (Android/most browsers; iOS Safari ignores it) ----
function buzz(p){ if(navigator.vibrate){ try{ navigator.vibrate(p); }catch(e){} } }

// ---- background music: looping chiptune (Korobeiniki, public domain) ----
const BEAT=0.26;
// [frequency or null, length in beats]
const TUNE=[
  [659,1],[494,.5],[523,.5],[587,1],[523,.5],[494,.5],
  [440,1],[440,.5],[523,.5],[659,1],[587,.5],[523,.5],
  [494,1.5],[523,.5],[587,1],[659,1],
  [523,1],[440,1],[440,1],[null,1],
  [587,1.5],[698,.5],[880,1],[784,.5],[698,.5],
  [659,1.5],[523,.5],[659,1],[587,.5],[523,.5],
  [494,1],[494,.5],[523,.5],[587,1],[659,1],
  [523,1],[440,1],[440,1],[null,1]
];
let musicTimer=null, mIndex=0, nextNoteTime=0;
function note(freq,when,dur,type,vol){
  const ac=audio(); if(!ac) return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,when);
  g.gain.setValueAtTime(0.0001,when);
  g.gain.exponentialRampToValueAtTime(vol,when+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,when+dur);
  o.connect(g); g.connect(ac.destination);
  o.start(when); o.stop(when+dur+0.02);
}
function schedule(){
  const ac=audio(); if(!ac) return;
  while(nextNoteTime < ac.currentTime+0.25){
    const [f,len]=TUNE[mIndex];
    if(f && !muted){
      note(f, nextNoteTime, len*BEAT*0.92, 'triangle', 0.05);   // melody
      note(f/2, nextNoteTime, len*BEAT*0.9, 'square', 0.025);   // soft bass
    }
    nextNoteTime += len*BEAT;
    mIndex=(mIndex+1)%TUNE.length;
  }
}
function startMusic(){
  const ac=audio(); if(!ac || musicTimer) return;
  mIndex=0; nextNoteTime=ac.currentTime+0.15;
  musicTimer=setInterval(schedule, 60);
}
function stopMusic(){ clearInterval(musicTimer); musicTimer=null; }

// cute pastel palette per piece
const COLORS={
  I:'#3fc6ff', O:'#ffd23f', T:'#c061ff',
  S:'#34e0a1', Z:'#ff5d8f', J:'#5b78ff', L:'#ff9f1c'
};
const SHAPES={
  I:[[0,1],[1,1],[2,1],[3,1]],
  O:[[1,0],[2,0],[1,1],[2,1]],
  T:[[1,0],[0,1],[1,1],[2,1]],
  S:[[1,0],[2,0],[0,1],[1,1]],
  Z:[[0,0],[1,0],[1,1],[2,1]],
  J:[[0,0],[0,1],[1,1],[2,1]],
  L:[[2,0],[0,1],[1,1],[2,1]]
};
const KEYS=Object.keys(SHAPES);

const playArea=document.querySelector('.play-area');
let cell=24; // recalculated on resize
function fit(){
  // fill the play area while keeping the 10:20 board ratio
  const availW = playArea.clientWidth - 20;   // minus stage padding
  const availH = playArea.clientHeight - 20;
  cell = Math.max(12, Math.floor(Math.min(availW/COLS, availH/ROWS)));
  board.width = cell*COLS;
  board.height = cell*ROWS;
}
window.addEventListener('resize', ()=>{ fit(); draw(); });
window.addEventListener('load', ()=>{ fit(); draw(); });   // re-fit after fonts load

let grid, cur, nextPiece, score, lines, level, combo, gameOver, paused, running;
let dropTimer=0, dropInterval=800, lastTime=0;

function blank(){ return Array.from({length:ROWS},()=>Array(COLS).fill(null)); }

function newPiece(type){
  type = type || KEYS[(Math.random()*KEYS.length)|0];
  return { type, color:COLORS[type], cells:SHAPES[type].map(c=>[...c]), x:3, y:0 };
}

function rotate(piece, dir){
  // rotate around centroid of bounding box (4x4-ish), simple matrix rotation
  const cells=piece.cells.map(([x,y])=>{
    // pivot at (1.5,1.5) works decently for these compact shapes
    const px=x-1.5, py=y-1.5;
    return dir>0 ? [Math.round(1.5-py),Math.round(1.5+px)]
                 : [Math.round(1.5+py),Math.round(1.5-px)];
  });
  return cells;
}

function collide(cells, ox, oy){
  for(const [x,y] of cells){
    const gx=x+ox, gy=y+oy;
    if(gx<0||gx>=COLS||gy>=ROWS) return true;
    if(gy>=0 && grid[gy][gx]) return true;
  }
  return false;
}

function move(dx,dy){
  if(!running||paused) return;
  if(!collide(cur.cells, cur.x+dx, cur.y+dy)){ cur.x+=dx; cur.y+=dy; draw(); return true; }
  return false;
}

function tryRotate(dir){
  if(!running||paused) return;
  const r=rotate(cur,dir);
  // wall kicks: try offsets
  for(const k of [0,-1,1,-2,2]){
    if(!collide(r, cur.x+k, cur.y)){ cur.cells=r; cur.x+=k; SFX.rotate(); draw(); return; }
  }
}

function softDrop(){
  if(!running||paused) return;
  if(!move(0,1)){ lock(); }
  else { score+=1; updateHud(); SFX.soft(); }
}

function hardDrop(){
  if(!running||paused) return;
  let d=0;
  while(!collide(cur.cells, cur.x, cur.y+1)){ cur.y++; d++; }
  score+=d*2; updateHud(); SFX.drop(); buzz(25);
  lock();
}

function lock(){
  SFX.lock();
  for(const [x,y] of cur.cells){
    const gy=y+cur.y, gx=x+cur.x;
    if(gy<0){ endGame(); return; }
    grid[gy][gx]=cur.color;
  }
  clearLines();
  cur=nextPiece; nextPiece=newPiece(); drawNext();
  if(collide(cur.cells, cur.x, cur.y)){ endGame(); return; }
  draw();
}

function clearLines(){
  let cleared=0;
  for(let y=ROWS-1;y>=0;y--){
    if(grid[y].every(c=>c)){
      grid.splice(y,1); grid.unshift(Array(COLS).fill(null));
      cleared++; y++;
    }
  }
  if(cleared){
    const oldLevel=level;
    combo++;
    let pts=[0,100,300,500,800][cleared]*level;
    if(combo>=1) pts+=50*combo*level;       // combo bonus
    score+=pts; lines+=cleared;
    level=Math.floor(lines/10)+1;
    dropInterval=Math.max(120, 800-(level-1)*70);
    updateHud();
    SFX.line(cleared); flash();
    buzz(cleared>=2 ? [40,30,40,30,60] : 50);
    if(combo>=1){ comboPop(combo+1); }       // x2, x3, ... for back-to-back
    if(cleared>=2) shake();
    if(level>oldLevel) setTimeout(()=>SFX.level(), 180);
  } else {
    combo=-1;                                 // chain broken
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function cube(ctx,gx,gy,color,size){
  const x=gx*size, y=gy*size, pad=Math.max(1,size*0.08);
  // neon glow
  ctx.save();
  ctx.shadowColor=color; ctx.shadowBlur=size*0.55;
  roundRect(ctx,x+pad,y+pad,size-pad*2,size-pad*2,size*0.28);
  ctx.fillStyle=color; ctx.fill();
  ctx.restore();
  // glossy highlight (no glow)
  ctx.fillStyle='rgba(255,255,255,.5)';
  roundRect(ctx,x+pad*1.6,y+pad*1.6,(size-pad*2)*0.5,(size-pad*2)*0.35,size*0.18);
  ctx.fill();
}

function draw(){
  bctx.clearRect(0,0,board.width,board.height);
  // soft grid dots
  bctx.fillStyle='rgba(255,255,255,.1)';
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    bctx.fillRect(x*cell+cell/2-1, y*cell+cell/2-1, 2,2);
  }
  // settled
  if(grid) for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    if(grid[y][x]) cube(bctx,x,y,grid[y][x],cell);
  }
  if(running && cur){
    // ghost
    let gy=cur.y;
    while(!collide(cur.cells,cur.x,gy+1)) gy++;
    bctx.globalAlpha=.25;
    for(const [x,y] of cur.cells) if(y+gy>=0) cube(bctx,x+cur.x,y+gy,cur.color,cell);
    bctx.globalAlpha=1;
    // current
    for(const [x,y] of cur.cells) if(y+cur.y>=0) cube(bctx,x+cur.x,y+cur.y,cur.color,cell);
  }
}

function drawNext(){
  nctx.clearRect(0,0,nextCv.width,nextCv.height);
  if(!nextPiece) return;
  const s=11;
  const xs=nextPiece.cells.map(c=>c[0]), ys=nextPiece.cells.map(c=>c[1]);
  const minX=Math.min(...xs), minY=Math.min(...ys);
  const w=(Math.max(...xs)-minX+1), h=(Math.max(...ys)-minY+1);
  const ox=(nextCv.width-w*s)/2/s - minX;
  const oy=(nextCv.height-h*s)/2/s - minY;
  for(const [x,y] of nextPiece.cells) cube(nctx,x+ox,y+oy,nextPiece.color,s);
}

function updateHud(){
  document.getElementById('score').textContent=score;
  document.getElementById('lines').textContent=lines;
  document.getElementById('level').textContent=level;
}

function loop(t){
  if(running && !paused){
    if(!lastTime) lastTime=t;
    dropTimer += t-lastTime;
    if(dropTimer>dropInterval){ dropTimer=0; if(!move(0,1)) lock(); }
  }
  lastTime=t;
  requestAnimationFrame(loop);
}

function start(){
  grid=blank(); score=0; lines=0; level=1; combo=-1; dropInterval=800;
  gameOver=false; paused=false; running=true; dropTimer=0; lastTime=0;
  cur=newPiece(); nextPiece=newPiece();
  updateHud(); drawNext(); draw();
  hideOverlay();
  startMusic();
}

function endGame(){
  running=false;
  stopMusic();
  SFX.over(); shake(); buzz([80,40,80,40,160]);
  showOverlay('🌷 Game Over','Sara, you scored '+score+' ♡  Tap to play again','Play again ♡');
}

function togglePause(){
  if(!running) return;
  paused=!paused;
  if(paused){ stopMusic(); showOverlay('⏸ Paused','Take a breath, Sara ♡','Resume ♡'); }
  else { hideOverlay(); startMusic(); }
}

const overlay=document.getElementById('overlay');
function showOverlay(title,text,btn){
  document.getElementById('ovTitle').textContent=title;
  document.getElementById('ovText').textContent=text;
  document.getElementById('playBtn').textContent=btn||'Play ♡';
  overlay.classList.add('show');
}
function hideOverlay(){ overlay.classList.remove('show'); }

document.getElementById('playBtn').addEventListener('click',()=>{
  if(paused){ paused=false; hideOverlay(); }
  else start();
});

// ---- button wiring (touch + click, with auto-repeat for move/down) ----
function hold(el, fn, repeat){
  let iv=null, to=null;
  const go=(e)=>{ e.preventDefault(); fn();
    if(repeat){ to=setTimeout(()=>{ iv=setInterval(fn,70); },220); } };
  const stop=()=>{ clearTimeout(to); clearInterval(iv); iv=to=null; };
  el.addEventListener('touchstart',go,{passive:false});
  el.addEventListener('touchend',stop);
  el.addEventListener('touchcancel',stop);
  el.addEventListener('mousedown',go);
  el.addEventListener('mouseup',stop);
  el.addEventListener('mouseleave',stop);
}
hold(document.getElementById('left'), ()=>{ if(move(-1,0)) SFX.move(); }, true);
hold(document.getElementById('right'),()=>{ if(move(1,0)) SFX.move(); }, true);
hold(document.getElementById('down'), ()=>softDrop(), true);
document.getElementById('spin').addEventListener('click',()=>tryRotate(1));
document.getElementById('pause').addEventListener('click',togglePause);

// swipe down on the board = hard drop (iPhone-style gesture)
(function(){
  let sx=0, sy=0, t=0;
  board.addEventListener('touchstart',e=>{
    const tp=e.changedTouches[0]; sx=tp.clientX; sy=tp.clientY; t=Date.now();
  },{passive:true});
  board.addEventListener('touchend',e=>{
    const tp=e.changedTouches[0];
    const dx=tp.clientX-sx, dy=tp.clientY-sy, dt=Date.now()-t;
    if(dy>40 && dy>Math.abs(dx)*1.5 && dt<500) hardDrop();   // quick downward swipe
  },{passive:true});
})();
document.getElementById('mute').addEventListener('click',e=>{
  muted=!muted; e.currentTarget.textContent=muted?'🔇':'🔊';
  if(!muted){ audio(); SFX.rotate(); }
});

// unlock iOS audio on first touch/click
['touchstart','mousedown'].forEach(ev=>document.addEventListener(ev,()=>audio(),{passive:true}));

// keyboard for desktop testing
document.addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' '].includes(e.key)) e.preventDefault();
  if(e.key==='ArrowLeft')move(-1,0);
  else if(e.key==='ArrowRight')move(1,0);
  else if(e.key==='ArrowDown')softDrop();
  else if(e.key==='ArrowUp')tryRotate(1);
  else if(e.key==='z')tryRotate(-1);
  else if(e.key===' ')hardDrop();
  else if(e.key==='p')togglePause();
});

// prevent iOS double-tap zoom / scroll bounce on the play area
document.addEventListener('gesturestart',e=>e.preventDefault());
document.body.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

fit(); draw(); requestAnimationFrame(loop);
</script>
</body>
</html>
